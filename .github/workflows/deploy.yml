name: Deploy to Digital Ocean

on:
  push:
    branches: [ master ]  # Se dispara cuando hay push a master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            echo "⏳ Iniciando deploy..."
            
            # Entrar en la carpeta de la app
            cd /opt/human-app/app

            # Ignorar logs localmente para no interferir con git
            echo "logs/" >> .gitignore
            git rm -r --cached logs/ || echo "Logs ya eliminados"
            git add .gitignore
            git commit -m "Ignore logs" || echo "No hay cambios para commit"

            # Traer los últimos cambios de la rama master
            git fetch origin master
            git reset --hard origin/master

            # Instalar dependencias (omitimos dev)
            npm ci --omit=dev

            # Recargar PM2
            pm2 reload ecosystem.config.js
            pm2 save

            echo "✅ Deploy completado exitosamente"
